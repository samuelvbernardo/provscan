name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ──────────────────────────────────────────────────
  # Backend — lint, testes e cobertura
  # ──────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    defaults:
      run:
        working-directory: scan_api

    env:
      DJANGO_ENV_FILE: ""
      SECRET_KEY: "ci-insecure-key-for-testing-only"
      DEBUG: "True"
      DATABASE_URL: "sqlite:///test_db.sqlite3"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: scan_api/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar ferramentas de qualidade
        run: pip install ruff pytest pytest-django coverage

      - name: Lint com ruff
        run: ruff check . --output-format=github

      - name: Verificar formatação com ruff
        run: ruff format --check .

      - name: Executar testes com cobertura
        run: |
          coverage run --source=. -m pytest \
            --tb=short \
            -q
        env:
          DJANGO_SETTINGS_MODULE: scan_api.settings

      - name: Relatório de cobertura
        run: coverage report --fail-under=70

      - name: Exportar cobertura XML
        run: coverage xml -o coverage.xml

      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: scan_api/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────
  # Frontend — lint e build
  # ──────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scan_web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scan_web/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint com ESLint
        run: npm run lint

      - name: Build de produção
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # URL interna usada apenas no servidor Next.js
          API_URL: "http://localhost:8000"

  # ──────────────────────────────────────────────────
  # Docker — build da imagem backend
  # ──────────────────────────────────────────────────
  docker-build:
    name: Docker build (backend)
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: ./scan_api
          push: false
          tags: provscan-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

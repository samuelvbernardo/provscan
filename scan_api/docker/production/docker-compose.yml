services:
  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: provscan_backend_prod
    restart: unless-stopped
    env_file:
      - ../../.envs/production/.production
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/schema/', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  media_data:
  static_data:
